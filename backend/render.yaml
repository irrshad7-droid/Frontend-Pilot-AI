services:
  - type: web
    name: frontendpilot-ai-api
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TARGET_APP_URL
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06